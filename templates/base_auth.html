{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Autenticación - Sistema Bomberos{% endblock %}</title>
    <!-- Favicon (Evitar error 404) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚒</text></svg>">
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5.3.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <!-- Nuestro CSS compilado -->
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: auto;
        }
        #tsparticles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        .container-auth {
            display: flex;
            max-width: 1200px;
            width: 100%;
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            z-index: 1;
        }
        .image-section {
            flex: 1;
            background: url("{% static 'FotoInicio.jpeg' %}") no-repeat center center;
            background-size: cover;
            position: relative;
            min-height: 600px;
            display: flex;
            align-items: flex-end;
            padding: 40px;
        }
        .image-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top, rgba(220, 53, 69, 0.4), rgba(0,0,0,0.2));
        }
        .image-content {
            position: relative;
            z-index: 2;
            color: #ffffff;
        }
        .image-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.2;
            text-shadow: 0 2px 15px rgba(0,0,0,0.3);
        }
        .image-subtitle {
            font-size: 1.1rem;
            font-weight: 400;
            opacity: 0.9;
            max-width: 450px;
        }
        .auth-section {
            flex: 1;
            background: #ffffff;
            padding: 40px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow-y: auto;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .logo {
            width: 50px;
            height: 50px;
            background: #dc3545;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }
        .logo-text {
            color: #212529;
            font-size: 18px;
            font-weight: 600;
            line-height: 1.3;
        }
        h1.auth-title {
            color: #212529;
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        .subtitle {
            color: #6c757d;
            margin-bottom: 40px;
            font-size: 14px;
        }
        .auth-section .form-control, .auth-section .form-select {
            padding: 14px 18px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            color: #212529;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .auth-section .form-control:focus, .auth-section .form-select:focus {
            outline: none;
            border-color: #dc3545;
            background-color: #ffffff;
            box-shadow: none;
        }
        .auth-section .form-control::placeholder { 
            color: #6c757d; 
        }
        .auth-button {
            width: 100%;
            padding: 16px;
            background: #dc3545;
            border: none;
            border-radius: 8px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .auth-button:hover {
            background-color: #c82333;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(220, 53, 69, 0.4);
        }
        .password-strength-meter {
            height: 8px;
            background-color: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }
        .strength-bar {
            height: 100%;
            width: 0;
            border-radius: 4px;
            transition: width 0.4s ease, background-color 0.4s ease;
        }
        .strength-text {
            font-size: 0.875em;
            text-align: right;
            margin-top: 4px;
        }
        #password-strength-container.strength-1 .strength-bar { background-color: #dc3545; } #password-strength-container.strength-1 .strength-text { color: #dc3545; }
        #password-strength-container.strength-2 .strength-bar { background-color: #fd7e14; } #password-strength-container.strength-2 .strength-text { color: #fd7e14; }
        #password-strength-container.strength-3 .strength-bar { background-color: #ffc107; } #password-strength-container.strength-3 .strength-text { color: #ffc107; }
        #password-strength-container.strength-4 .strength-bar { background-color: #20c997; } #password-strength-container.strength-4 .strength-text { color: #20c997; }
        #password-strength-container.strength-5 .strength-bar { background-color: #198754; } #password-strength-container.strength-5 .strength-text { color: #198754; }
        .input-group .toggle-password { cursor: pointer; }
        @media (max-width: 968px) {
            .container-auth { flex-direction: column; }
            .image-section { display: none; }
            .auth-section { padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <!-- Contenedor para el fondo de partículas -->
    <div id="tsparticles"></div>

    <div class="container-auth">
        <div class="image-section">
            <div class="image-content">
                <h2 class="image-title">Plataforma Integral para Cuerpos de Bomberos</h2>
                <p class="image-subtitle">Gestión eficiente de emergencias, recursos y personal. Todo en un solo lugar.</p>
            </div>
        </div>
        <div class="auth-section">
            {% block content %}{% endblock %}
        </div>
    </div>
    
    <!-- Librería para las partículas -->
    <script src="https://cdn.jsdelivr.net/npm/tsparticles-slim@2.12.0/tsparticles.slim.bundle.min.js"></script>
    <!-- Bootstrap 5.3.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
    {% block scripts %}
    <script>
        // Configuración e inicialización de ts-particles
        document.addEventListener('DOMContentLoaded', async (event) => {
            await tsParticles.load("tsparticles", {
                fpsLimit: 60,
                interactivity: {
                    events: {
                        onHover: {
                            enable: true,
                            mode: "repulse",
                        },
                        resize: true,
                    },
                    modes: {
                        repulse: {
                            distance: 100,
                            duration: 0.4,
                        },
                    },
                },
                particles: {
                    color: {
                        value: "#dc3545", // Color rojo de bombero
                    },
                    links: {
                        color: "#343a40", // Cambiamos el color de las líneas a oscuro para que se vean en fondo claro
                        distance: 150,
                        enable: true,
                        opacity: 0.3, // Aumentamos la opacidad de las líneas
                        width: 1,
                    },
                    move: {
                        direction: "none",
                        enable: true,
                        outModes: "out",
                        random: false,
                        speed: 2, // Aumentamos un poco la velocidad
                        straight: false,
                    },
                    number: {
                        density: {
                            enable: true,
                        },
                        value: 120, // Aumentamos la cantidad de partículas
                    },
                    opacity: { value: 0.5 }, // Hacemos las partículas más opacas
                    shape: { type: "circle" },
                    size: { value: { min: 1, max: 4 } }, // Aumentamos ligeramente el tamaño máximo
                },
                detectRetina: true,
            });
        });
    </script>
    {% endblock %}
</body>
</html>

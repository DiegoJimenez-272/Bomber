<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Código QR - {{ item.get_nombre_display }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #e9ecef;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .label-container {
            width: 350px;
            margin: 40px auto;
            background-color: #fff;
            border-radius: 0.5rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
            overflow: hidden; /* Para que el header no se salga */
        }
        .label-header {
            background-color: #dc3545;
            color: white;
            padding: 1rem;
            text-align: center;
        }
        .label-header h5 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
        }
        .label-body {
            padding: 1.5rem;
            text-align: center;
        }
        .qr-code-img {
            max-width: 200px;
            height: auto;
            margin-bottom: 1.5rem;
        }
        .item-details h5 {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        .item-details p {
            font-size: 1rem;
            color: #6c757d;
            margin-bottom: 0.25rem;
        }
        .actions {
            display: flex;
            gap: 10px;
            padding: 0 1.5rem 1.5rem;
        }
        @media print {
            body {
                background-color: #fff;
            }
            .qr-container {
                box-shadow: none !important;
                border: 1px solid #ccc;
                margin: 0;
                max-width: 100%;
            }
            .no-print {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="label-container">
        <div class="label-header">
            <h5>Cuerpo de Bomberos</h5>
        </div>
        <div class="label-body">
            <img src="{{ item.qr_code.url }}" alt="Código QR para {{ item.get_nombre_display }}" class="qr-code-img">
            <div class="item-details">
                <h5>{{ item.get_nombre_display }}</h5>
                <p class="mb-0"><strong>Asignado a:</strong> {{ item.asignado_a.get_full_name }}</p>
                <p><strong>Ubicación:</strong> {{ item.ubicacion }}</p>
            </div>
        </div>
    </div>
    <div class="actions label-container no-print" style="padding-top: 0; margin-top: -30px;">
        <button onclick="window.print()" class="btn btn-danger w-100">
            <i class="bi bi-printer-fill me-2"></i>Imprimir Etiqueta
        </button>
        <a href="{{ item.qr_code.url }}" download="qr-item-{{ item.id }}.png" class="btn btn-outline-secondary w-100">
            <i class="bi bi-download me-2"></i>Descargar QR
        </a>
    </div>
</body>
</html>
